spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/hcq_jianli
    username: "{your-username}" # 这里换成你的数据库用户名
    password: "{your-password}" # 这里换成你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver

#暂留：想要可以做ai聊天功能
  ai:
    dashscope:
      api-key: "{your-api-key}" # 这里换成你的DashScope API Key
      chat:
        options:
          model: "{your-model}" # 这里换成你的模型名称，例如：gpt-3.5-turbo
          temperature: 0.7
          max-tokens: 8000

logging:
  level:
    com.alibaba.cloud.ai: DEBUG


mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.example.demo.pojo

file:
  upload-dir: D:/JL/demo/uploads/photos
  base-url: http://localhost:8080
  template-image-dir: D:/JL/demo/images/JL